name: tech-memory-scheduler

on:
  schedule:
    - cron: '0 */4 * * *'  # 每 4 小时运行一次 (UTC)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: tech-memory-scheduler
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Tech Memory workflow
        env:
          TECH_MEMORY_DATABASE_URL: ${{ secrets.TECH_MEMORY_DATABASE_URL }}
          SUPABASE_CONNECTION_URI: ${{ secrets.SUPABASE_CONNECTION_URI }}
          Connection_pooling: ${{ secrets.CONNECTION_POOLING }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME }}
          PGSSLMODE: require
        run: |
          python generated/tech_memory_workflow/run.py \
            --non-interactive \
            --supabase \
            --supabase-use-pooler

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tech-memory-output
          path: output/tech_memory_workflow/**
          retention-days: 3
